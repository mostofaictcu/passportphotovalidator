version: '3.8'

services:
  passport-validator:
    build: .
    container_name: passport-validator-api
    ports:
      - "5001:8000"
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
