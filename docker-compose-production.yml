version: '3.8'

services:
  passport-validator:
    build: .
    container_name: passport-validator-api
    expose:
      - "5001"
    environment:
      - PORT=5001
    restart: unless-stopped
    networks:
      - helpdesk-backend_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  helpdesk-backend_default:
    external: true